---
layout: default
---

<div class="home">

  <h2>Submit a job</h2>
  <h3>&nbsp;</h3>
  <div class="content">
    Do you have an awesome job you would like to share with <b>developers from Europe</b>?
    Fill in the form below and after a review it will be included in the next
    issue.
  </div>
  <div id="submit_job">
    <form accept-charset="UTF-8" action="https://formkeep.com/f/586030297ad9" method="POST">
      <div class="form-group">
        <label>Job title *</label>
        <input name="job_title" placeholder="Example: Junior Front End Developer" required="true">
      </div>
      <div class="form-group">
        <label>Job URL *</label>
        <input name="url" type="url" required="true">
      </div>
      <div class="form-group">
        <label>Contact email *</label>
        <input name="email" type="email" required="true">
      </div>
      <div class="form-group">
        <label>Additional info</label>
        <textarea name="info"></textarea>
      </div>
      <div class="form-group">
        <input type="submit" value="Submit job" name="subscribe" id="mc-embedded-subscribe" class="button"> </div>
      </div>
    </form>
  </div>
</div>
